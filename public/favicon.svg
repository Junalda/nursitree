<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Green circle background for favicon visibility -->
  <circle cx="50" cy="50" r="50" fill="#5B9A2F"/>
  
  <!-- Tree crown - organic cloud shape -->
