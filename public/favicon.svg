    M50 15
    C62 15 72 22 76 32
    C82 30 90 36 90 46
    C90 55 83 62 76 63
    C76 70 68 75 58 75
    L42 75
    C32 75 24 70 24 63
    C17 62 10 55 10 46
    C10 36 18 30 24 32
    C28 22 38 15 50 15Z
  " fill="#4A8526"/>
  
  <!-- Trunk -->
  <rect x="46" y="68" width="8" height="20" rx="1" fill="white"/>
  
  <!-- Small base roots -->
  <path d="M46 86 L40 92 L44 88 Z" fill="white"/>
  <path d="M54 86 L60 92 L56 88 Z" fill="white"/>
  
  <!-- Center arrow up -->
  <line x1="50" y1="70" x2="50" y2="28" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <polygon points="50,20 44,32 56,32" fill="white"/>
  
  <!-- Upper left arrow -->
  <line x1="50" y1="48" x2="30" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <polygon points="24,27 32,38 38,30" fill="white"/>
  
  <!-- Upper right arrow -->
  <line x1="50" y1="48" x2="70" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <polygon points="76,27 62,30 68,38" fill="white"/>
  
  <!-- Mid left arrow -->
  <line x1="50" y1="58" x2="24" y2="50" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="18,46 26,56 30,47" fill="white"/>
  
  <!-- Mid right arrow -->
  <line x1="50" y1="58" x2="76" y2="50" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="82,46 70,47 74,56" fill="white"/>
</svg>